version: "3.9"

services:
  breast-cancer-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: breast-cancer-predictor
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
